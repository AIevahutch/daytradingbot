<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script>
      const STREAMLIT_API_VERSION = 1;
      const MIN_REFRESH_INTERVAL_MS = 10000;
      let refreshTimeout = null;
      let readyInterval = null;
      let hasRendered = false;

      function sendStreamlitMessage(type, payload = {}) {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type,
            ...payload,
          },
          "*"
        );
      }

      function setComponentReady() {
        sendStreamlitMessage("streamlit:componentReady", {
          apiVersion: STREAMLIT_API_VERSION,
        });
      }

      function startReadyHandshake() {
        setComponentReady();
        readyInterval = window.setInterval(() => {
          if (hasRendered) {
            window.clearInterval(readyInterval);
            readyInterval = null;
            return;
          }
          setComponentReady();
        }, 250);
      }

      function setFrameHeight(height = 0) {
        sendStreamlitMessage("streamlit:setFrameHeight", { height });
      }

      function setComponentValue(value) {
        sendStreamlitMessage("streamlit:setComponentValue", {
          value,
          dataType: "json",
        });
      }

      function userIsEditing() {
        try {
          const active = window.parent.document.activeElement;
          if (!active) return false;
          const tag = (active.tagName || "").toLowerCase();
          return tag === "input" || tag === "textarea" || active.isContentEditable;
        } catch (error) {
          return false;
        }
      }

      function scheduleRefresh(intervalMs) {
        if (refreshTimeout) {
          window.clearTimeout(refreshTimeout);
        }
        refreshTimeout = window.setTimeout(() => {
          if (userIsEditing()) {
            scheduleRefresh(intervalMs);
            return;
          }
          setComponentValue({ refreshedAt: Date.now() });
        }, intervalMs);
      }

      window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.type !== "streamlit:render") return;
        hasRendered = true;
        if (readyInterval) {
          window.clearInterval(readyInterval);
          readyInterval = null;
        }
        const args = data.args || {};
        const intervalMs = Math.max(
          Number(args.interval_ms || 60000),
          MIN_REFRESH_INTERVAL_MS
        );
        setFrameHeight(0);
        scheduleRefresh(intervalMs);
      });

      startReadyHandshake();
    </script>
  </body>
</html>
